name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  spark-build:
    name: Spark jobs (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: mvn verify
        working-directory: final/spark-jobs
        run: mvn -B -ntp verify

  generator-build:
    name: Generator (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: final/generator
      - name: cargo check
        working-directory: final/generator
        run: cargo check --release
      - name: cargo test
        working-directory: final/generator
        run: cargo test --release

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate compose
        working-directory: final
        env:
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-secret
          AWS_ACCESS_KEY_ID: ci
          AWS_SECRET_ACCESS_KEY: ci-secret
          AWS_REGION: us-east-1
          S3_ENDPOINT: http://minio:9000
          CH_JDBC_URL: jdbc:ch://clickhouse:8123/bronze
          SESSIONS_PER_HOUR: '10000'
          BATCH_WINDOW_SECONDS: '3600'
        run: |
          cat > .env <<EOF
          MINIO_ROOT_USER=$MINIO_ROOT_USER
          MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD
          AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
          AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
          AWS_REGION=$AWS_REGION
          S3_ENDPOINT=$S3_ENDPOINT
          CH_JDBC_URL=$CH_JDBC_URL
          SESSIONS_PER_HOUR=$SESSIONS_PER_HOUR
          BATCH_WINDOW_SECONDS=$BATCH_WINDOW_SECONDS
          EOF
          docker compose -f docker-compose.yml config -q

  deploy:
    name: Deploy to prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [spark-build, generator-build, compose-validate]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      DEPLOY_SSH_KEY:      ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_HOST:         ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER:         ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH:         ${{ secrets.DEPLOY_PATH }}
      MINIO_ROOT_USER:     ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: setup ssh key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: ensure destination dir exists on host
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p \"$DEPLOY_PATH\""

      - name: rsync project to host
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='**/target' \
            --exclude='**/.idea' \
            --exclude='**/node_modules' \
            ./final/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: write .env on host
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "umask 077 && cat > $DEPLOY_PATH/.env" <<EOF
          MINIO_ROOT_USER=$MINIO_ROOT_USER
          MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD
          AWS_ACCESS_KEY_ID=$MINIO_ROOT_USER
          AWS_SECRET_ACCESS_KEY=$MINIO_ROOT_PASSWORD
          AWS_REGION=us-east-1
          S3_ENDPOINT=http://minio:9000
          CH_JDBC_URL=jdbc:ch://clickhouse:8123/bronze
          SESSIONS_PER_HOUR=10000
          BATCH_WINDOW_SECONDS=3600
          EOF

      - name: compose up
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"
            docker compose pull --ignore-pull-failures || true
            docker compose up -d --build --remove-orphans
            docker compose up -d --force-recreate --no-deps grafana
            docker compose ps
          EOF

      - name: smoke check
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<EOF
            set -e
            cd "$DEPLOY_PATH"
            for i in 1 2 3 4 5 6; do
              docker compose exec -T clickhouse \
                clickhouse-client --user "$MINIO_ROOT_USER" --password "$MINIO_ROOT_PASSWORD" \
                --query 'SELECT 1' && exit 0
              sleep 10
            done
            echo 'ClickHouse not responding after 60s'
            docker compose logs clickhouse | tail -50
            exit 1
          EOF

      - name: cold-backfill one-shot (wait for first ParseJob, then aggregate cold partitions)
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<EOF
            set -e
            cd "$DEPLOY_PATH"
            echo "waiting 120s for first ParseJob tick to populate bronze.events..."
            sleep 120
            docker compose exec -T clickhouse \
              clickhouse-client --user "$MINIO_ROOT_USER" --password "$MINIO_ROOT_PASSWORD" --multiquery --query "
                INSERT INTO gold.card_search_doc_hits_daily
                SELECT event_date AS date,
                       JSONExtractString(arrayJoin(JSONExtractArrayRaw(result_doc_ids_json))) AS doc_id,
                       count() AS hits, now() AS computed_at
                FROM bronze.events FINAL
                WHERE event_type = 'CARD_SEARCH' AND event_date IS NOT NULL AND event_date < today() - 10
                GROUP BY date, doc_id;

                INSERT INTO gold.qs_doc_opens_daily
                SELECT event_date AS open_date, doc_id,
                       count() AS opens, now() AS computed_at
                FROM bronze.events FINAL
                WHERE event_type = 'DOC_OPEN' AND search_kind = 'QS' AND doc_id IS NOT NULL
                  AND event_date IS NOT NULL AND event_date < today() - 10
                GROUP BY event_date, doc_id;
              "
            echo "cold-backfill done"
          EOF

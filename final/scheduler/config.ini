[global]

# Parse cron: runs Spark ParseJob (textâ†’CH bronze) every minute.
# Aggregation (bronzeâ†’gold) is now done inside ClickHouse via Refreshable MVs,
# so there's no aggregate-job here.
# Parquet exports (CHâ†’S3 parquet) are also done by CH-side Refreshable MVs (hourly).

[job-exec "parse"]
schedule = @every 1m
container = spark-job
command = flock -n /tmp/parse.lock spark-submit --driver-memory 3g --class ru.consultant.lakehouse.jobs.ParseJob /opt/spark/jars/spark-jobs.jar

# Cold backfill: once a day, recompute gold partitions older than the MV's
# hot window (today() - 10). Lets the initial seed history land in gold even
# though the live MV ignores cold dates. Re-runnable: ReplacingMergeTree
# overwrites by (date, doc_id) using the new computed_at.
[job-exec "cold-backfill"]
schedule = @every 24h
container = clickhouse
command = clickhouse-client --user ${MINIO_ROOT_USER} --password ${MINIO_ROOT_PASSWORD} --multiquery --query "INSERT INTO gold.card_search_doc_hits_daily SELECT event_date AS date, JSONExtractString(arrayJoin(JSONExtractArrayRaw(result_doc_ids_json))) AS doc_id, count() AS hits, now() AS computed_at FROM bronze.events FINAL WHERE event_type = 'CARD_SEARCH' AND event_date IS NOT NULL AND event_date < today() - 10 GROUP BY date, doc_id; INSERT INTO gold.qs_doc_opens_daily SELECT event_date AS open_date, doc_id, count() AS opens, now() AS computed_at FROM bronze.events FINAL WHERE event_type = 'DOC_OPEN' AND search_kind = 'QS' AND doc_id IS NOT NULL AND event_date IS NOT NULL AND event_date < today() - 10 GROUP BY event_date, doc_id;"

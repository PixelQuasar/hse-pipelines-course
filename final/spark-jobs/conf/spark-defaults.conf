# Hadoop S3A — for reading raw text files from MinIO
spark.hadoop.fs.s3a.endpoint                                      http://minio:9000
spark.hadoop.fs.s3a.path.style.access                             true
spark.hadoop.fs.s3a.connection.ssl.enabled                        false
spark.hadoop.fs.s3a.aws.credentials.provider                      org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Workaround for aarch64 JVM native crash in Spark whole-stage codegen.
# Disabled here for safety; without Iceberg-bundled Hive classes it may not be
# strictly required anymore, but keeping it is harmless on our workload.
spark.sql.codegen.wholeStage                                      false
spark.sql.adaptive.enabled                                        false

apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-main
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: $CLICKHOUSE_USER
      defaultDatabase: gold
    secureJsonData:
      password: $CLICKHOUSE_PASSWORD
    editable: false
